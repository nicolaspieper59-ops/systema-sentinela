name: SENTINELA HARD-REALTIME - Matrix Engine

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-matrix:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Extraction du code source (Checkout)
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Initialisation de l'environnement Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Installation des dépendances astrophysiques
      run: |
        python -m pip install --upgrade pip
        pip install requests numpy astropy jplephem

    - name: 4. Exécution du Moteur Orbital Vectorisé
      run: |
        if [ -f "generate_matrix.py" ]; then
          python generate_matrix.py
        elif [ -f "calculer_orbites.py" ]; then
          python calculer_orbites.py
        else
          python main.py
        fi

    - name: 5. Déploiement et Push de la matrice mise à jour
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Sentinela Core Bot"
        git config --global user.email "sentinela-bot@github.com"
        
        git add flux_live.json 2>/dev/null || true
        
        if git diff --staged --quiet; then
          echo "⚡ Aucune dérive orbitale détectée."
        else
          echo "🛰️ Alignement de la matrice topocentrique..."
          git commit -m "SENTINELA : Régénération de la matrice 1440 min [Automatique Cloud]"
          git push origin HEAD:${{ github.ref }}
        fi
