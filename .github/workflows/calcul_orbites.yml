name: Astronomical Ephemeris Generation

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-ephemeris-engine:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Extraction du dépôt
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Initialisation du runtime Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Chargement étanche des dépendances
      run: |
        python -m pip install --upgrade pip
        python -m pip install numpy astropy jplephem requests astropy-iers-data

    - name: 4. Exécution du générateur d'éphémérides
      run: python ephemerides_engine.py

    - name: 5. Publication et synchronisation du dépôt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Astropy Automation Bot"
        git config --global user.email "astropy-bot@github.com"
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        
        git add flux_live.json 2>/dev/null || true
        
        if git diff --staged --quiet; then
          echo "Aucune déviation orbitale détectée."
        else
          echo "Modifications cinématiques détectées. Synchronisation réseau en cours..."
          git commit -m "Ephemeris Update: Vectorized IAU-2000/2006 Dataset [Automated]"
          git push origin HEAD:${{ github.ref }}
        fi
