name: Noyau Multiphysique Éphémérides v10

on:
  schedule:
    - cron: '*/10 * * * *'  # Exécution automatisée toutes les 10 minutes
  workflow_dispatch:
    inputs:
      latitude:
        description: "Latitude Géodésique WGS84 Station Base (deg)"
        required: true
        default: "43.284356"
      longitude:
        description: "Longitude Géodésique WGS84 Station Base (deg)"
        required: true
        default: "5.358507"
      altitude:
        description: "Altitude Ellipsoïdale Haute Précision Station Base (m)"
        required: true
        default: "99.3100"

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4

    - name: Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installation des dépendances métrologiques
      run: |
        python -m pip install --upgrade pip
        pip install numpy skyfield

    - name: Téléchargement ou Cache des Éphémérides de421.bsp
      run: |
        if [ ! -f de421.bsp ]; then
          curl -O https://storage.googleapis.com/skyfield-ephemerides/de421.bsp
        fi

    - name: Exécution du calcul des tenseurs cartésiens ITRS
      run: |
        python dynamic_multiphysics_engine.py \
          "${{ github.event.inputs.latitude || '43.284356' }}" \
          "${{ github.event.inputs.longitude || '5.358507' }}" \
          "${{ github.event.inputs.altitude || '99.3100' }}"

    - name: Déploiement Atomique du Flux JSON
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add flux_live.json
        if ! git diff-index --quiet HEAD --; then
          git commit -m "SENTINELA v10.6.0: Recalcul des tenseurs vectoriels tridimensionnels ITRS"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
        else
          echo "Aucune déviation orbitale structurelle à enregistrer."
        fi
