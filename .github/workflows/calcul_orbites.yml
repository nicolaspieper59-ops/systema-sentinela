name: SENTINELA - RECONSTRUCTION FORCEE

on:
  schedule:
    - cron: '5 * * * *'  # S'exécute automatiquement à la 5ème minute de chaque heure
  workflow_dispatch:     # Permet un allumage/déclenchement forcé manuel via l'interface GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Configuration de l'environnement Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installation du module Requests
        run: pip install requests

      - name: Calcul des éphémérides (Execution Script)
        run: python calculer_orbites.py

      # CORRECTIF MAJEUR : On dit à GitHub de déployer le dossier isolé /dist créé par Python
      - name: Configurer l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Déploiement Flash GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
