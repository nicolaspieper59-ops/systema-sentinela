name: Moteur Multiphysique Éphémérides

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      profile:
        description: "Sélection du profil d'espace-temps"
        required: true
        default: 'MARSEILLE_FIXE'
        type: choice
        options:
          - MARSEILLE_FIXE
          - AVION
          - TRAIN
          - VOITURE
          - BATEAU

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installation des dépendances métrologiques JPL
      run: |
        python -m pip install --upgrade pip
        pip install numpy skyfield jplephem astroquery

    - name: Exécution du calcul physique JPL
      run: |
        PROFILE_MODE="${{ github.event.inputs.profile }}"
        if [ -z "$PROFILE_MODE" ]; then
          PROFILE_MODE="MARSEILLE_FIXE"
        fi
        echo "[EXECUTION] Lancement du moteur sous le profil : $PROFILE_MODE"
        python dynamic_multiphysics_engine.py "$PROFILE_MODE"

    - name: Déploiement et sauvegarde du flux de données
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add flux_live.json
        if ! git diff-index --quiet HEAD --; then
          git commit -m "Mise à jour métrologique JPL DE440 LMT-Pure : $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
        else
          echo "Divergence géodésique infra-millimétrique. Aucun commit requis."
        fi
