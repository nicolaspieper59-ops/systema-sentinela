name: Noyau Multiphysique Éphémérides v10

on:
  schedule:
    - cron: '*/10 * * * *' # Exécution automatisée synchronisée (Toutes les 10 min)
  workflow_dispatch:      # Permet le déclenchement manuel depuis l'interface

permissions:
  contents: write

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4

    - name: Génération dynamique des prérequis
      run: |
        echo "numpy" > requirements.txt
        echo "skyfield" >> requirements.txt

    - name: Configuration de Python & Mise en Cache Pip
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Gestion du Cache pour l'Éphéméride de421.bsp
      id: cache-bsp
      uses: actions/cache@v4
      with:
        path: de421.bsp
        key: bsp-de421-v1

    - name: Exécution du Moteur Multiphysique
      run: |
        python dynamic_multiphysics_engine.py 43.284356 5.358507 99.3100

    - name: Commit et Push des résultats
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add flux_live.json
        if ! git diff-index --quiet HEAD --; then
          git commit -m "Mise à jour automatique du vecteur d'état céleste [CI]"
          git push
        else
          echo "Aucune variation détectée dans la matrice d'état."
        fi
