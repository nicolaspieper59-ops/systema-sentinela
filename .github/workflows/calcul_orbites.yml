name: Moteur Multiphysique Éphémérides

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

# Résolution de l'avertissement global GitHub 2026 pour Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4

    - name: Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # Suppression de la ligne cache: 'pip' pour éviter le plantage si le fichier est introuvable

    - name: Installation des dépendances métrologiques
      run: |
        python -m pip install --upgrade pip
        # Sécurité : Vérifie si le fichier existe, sinon installe les paquets en dur
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          pip install numpy astropy
        fi

    - name: Exécution du calcul physique (Mode Avion par défaut)
      run: |
        python dynamic_multiphysics_engine.py avion > flux_live.json

    - name: Déploiement et sauvegarde du flux de données
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add flux_live.json
        git diff-index --quiet HEAD || git commit -m "Mise à jour métrologique TAI : $(date -u)"
        git push
