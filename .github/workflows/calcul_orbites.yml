name: SENTINELA - RECONSTRUCTION FORCEE

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Configuration de l'environnement Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installation des dépendances Astronomiques
        run: pip install requests skyfield

      # Utilisation du miroir officiel de l'UAI pour garantir un téléchargement propre en moins de 3 secondes
      - name: Pré-chargement du Noyau Ephémérides JPL (DE421)
        run: |
          curl -sL "https://github.com/skyfielders/python-skyfield/raw/master/ci/de421.bsp" -o de421.bsp
          ls -lh de421.bsp

      - name: Calcul des éphémérides (Execution Script)
        run: python calculer_orbites.py

      - name: Preparation du deploiement
        run: |
          mkdir _site
          rsync -av --exclude='.git*' --exclude='_site' --exclude='de421.bsp' ./ _site/

      - name: Configurer l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Déploiement Flash GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
