// CONFIGURATION DE L'ACTIONNEUR CLOUD GITHUB
const GITHUB_REPO = "nicolaspieper59-ops/systema-sentinela"; // Votre dépôt
const WORKFLOW_ID = "sentinela.yml"; // Nom de votre fichier YAML

async function basculerProfilSpatioTemporel(modeCible) {
    let token = localStorage.getItem('git_sentinela_token');
    
    if (!token) {
        token = prompt("Entrez votre jeton d'accès GitHub (Classic PAT ou Fine-Grained) pour valider l'action Cloud :");
        if (!token) return;
        localStorage.setItem('git_sentinela_token', token);
    }

    ecrireLog(`[CLOUD] Demande d'activation du profil : ${modeCible}...`);

    try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                ref: 'main', // Branche d'exécution
                inputs: { profile: modeCible }
            })
        });

        if (response.status === 204) {
            ecrireLog(`[🚀 CLOUD OK] Ordre accepté par GitHub ! Lancement du Build Actions...`);
        } else {
            const errData = await response.json();
            throw new Error(errData.message || "Erreur d'authentification");
        }
    } catch (err) {
        ecrireLog(`[ÉCHEC CLOUD] : ${err.message}`);
        if(err.message.includes("Bad credentials")) {
            localStorage.removeItem('git_sentinela_token'); // Purge du mauvais token
        }
    }
}
