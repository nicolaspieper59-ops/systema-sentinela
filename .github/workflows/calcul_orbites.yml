name: SENTINELA HARD-REALTIME - Matrix Engine

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-matrix:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Extraction du code source (Checkout)
      uses: actions/checkout@v4

    - name: 2. Initialisation de l'environnement Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Installation des dépendances légères
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 4. Exécution du Moteur Orbital Calculer_Orbites
      run: |
        python calculer_orbites.py

    - name: 5. Déploiement et Push de la matrice mise à jour sur GitHub Pages
      run: |
        git config --global user.name "Sentinela Core Bot"
        git config --global user.email "sentinela-bot@github.com"
        
        git add matrice_jpl_brute.csv flux_live.json
        
        if git diff --staged --quiet; then
          echo "Aucune dérive orbitale détectée. Matrice inchangée."
        else
          git commit -m "SENTINELA : Régénération de la matrice 5D [Automatique Cloud]"
          git push
        fi
