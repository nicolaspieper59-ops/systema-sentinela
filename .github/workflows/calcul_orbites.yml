name: Moteur Multiphysique Éphémérides

on:
  schedule:
    - cron: '*/10 * * * *' # Exécution automatique toutes les 10 minutes
  workflow_dispatch:      # Permet le déclenchement manuel depuis l'interface GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Critique : Donne le droit d'écrire et de push sur le dépôt

    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4
      with:
        persist-credentials: true # Conserve les droits d'accès pour le push final

    - name: Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Optimise le temps d'exécution en mettant en cache les paquets pip

    - name: Installation des dépendances métrologiques JPL
      run: |
        python -m pip install --upgrade pip
        pip install numpy skyfield jplephem

    - name: Vérification de la présence du script
      run: |
        if [ ! -f dynamic_multiphysics_engine.py ]; then
          echo "[CRITICAL] Fichier d'ingénierie manquant !"
          exit 1
        fi

    - name: Exécution du calcul physique JPL
      run: |
        # On passe explicitement le paramètre au script Python (ex: avion)
        python dynamic_multiphysics_engine.py avion > flux_live.json

    - name: Déploiement et sauvegarde du flux de données
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add flux_live.json
        # Le script vérifie s'il y a des changements pour éviter de générer des commits inutiles
        if ! git diff-index --quiet HEAD --; then
          git commit -m "Mise à jour métrologique JPL DE440 : $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
        else
          echo "Aucune variation métrologique détectée. Commit annulé."
        fi
