name: SENTINELA - RECONSTRUCTION FORCEE
on:
  workflow_dispatch: # Permet le déclenchement manuel sur mobile

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configuration Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installation Requests
        run: pip install requests

      - name: Calcul des éphémérides
        run: python calculer_orbites.py

      - name: Commiter la matrice
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "SENTINELA : Régénération de la matrice 5D"
          file_pattern: 'orbites.json'
