name: SENTINELA - RECONSTRUCTION FORCEE

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # AJOUT DE L'ENVIRONNEMENT CRITIQUE DEMANDÉ PAR GITHUB
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Configuration de l'environnement Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installation du module Requests
        run: pip install requests

      - name: Calcul des éphémérides (Execution Script)
        run: python calculer_orbites.py

      - name: Commiter la nouvelle matrice
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "SENTINELA : Régénération de la matrice 5D [Automatique]"
          file_pattern: 'orbites.json'

      - name: Configurer l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Déploiement Flash GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
