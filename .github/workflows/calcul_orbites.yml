name: Moteur Multiphysique Éphémérides

on:
  schedule:
    # S'exécute automatiquement toutes les 10 minutes (Fréquence maximale gratuite sur GitHub)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permet de lancer le calcul manuellement depuis l'interface GitHub

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Autorise GitHub à enregistrer le nouveau fichier JSON sur le dépôt

    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4

    - name: Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Installation des dépendances métrologiques
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Exécution du calcul physique (Mode Avion par défaut)
      run: |
        # On exécute le script et on redirige la sortie JSON brute dans le fichier cible
        python dynamic_multiphysics_engine.py avion > flux_live.json

    - name: Déploiement et sauvegarde du flux de données
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add flux_live.json
        # On applique un commit uniquement si les données ont changé
        git diff-index --quiet HEAD || git commit -m "Mise à jour métrologique TAI : $(date -u)"
        git push
