name: SENTINELA HARD-REALTIME - Matrix Engine

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Élimine le warning GitHub Actions 2026 en forçant le moteur d'exécution Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-matrix:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Extraction du code source (Checkout)
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Initialisation de l'environnement Python (Correctif Cache)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # Le paramètre 'cache: pip' a été retiré pour éviter l'échec d'absence de requirements.txt

    - name: 3. Installation des dépendances astrophysiques
      run: |
        python -m pip install --upgrade pip
        pip install requests numpy astropy

    - name: 4. Exécution du Moteur Orbital Calculer_Orbites
      run: |
        if [ -f "calculer_orbites.py" ]; then
          python calculer_orbites.py
        elif [ -f "generate_matrix.py" ]; then
          python generate_matrix.py
        else
          echo "ERREUR : Script du moteur introuvable." && exit 1
        fi

    - name: 5. Déploiement et Push de la matrice mise à jour
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Sentinela Core Bot"
        git config --global user.email "sentinela-bot@github.com"
        
        git add -A flux_live.json matrice_jpl_brute.csv 2>/dev/null || git add flux_live.json
        
        if git diff --staged --quiet; then
          echo "⚡ Aucune dérive orbitale détectée. Matrice spatio-temporelle inchangée."
        else
          echo "🛰️ Dérive détectée. Alignement de la matrice topocentrique..."
          git commit -m "SENTINELA : Régénération de la matrice 3D [Automatique Cloud]"
          git push origin HEAD:${{ github.ref }}
        fi
