name: Moteur Multiphysique Éphémérides

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4

    - name: Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installation des dépendances métrologiques
      run: |
        python -m pip install --upgrade pip
        # Utilisation d'un opérateur monoligne standard pour éviter l'exit code 2 du 'if'
        pip install numpy astropy

    - name: Vérification de la présence du script
      run: |
        echo "=== Liste des fichiers à la racine ==="
        ls -la
        if [ ! -f dynamic_multiphysics_engine.py ]; then
          echo "[CRITICAL] Le fichier dynamic_multiphysics_engine.py est introuvable !"
          exit 1
        fi

    - name: Exécution du calcul physique
      run: |
        python dynamic_multiphysics_engine.py avion > flux_live.json

    - name: Déploiement et sauvegarde du flux de données
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add flux_live.json
        git diff-index --quiet HEAD || git commit -m "Mise à jour métrologique TAI : $(date -u)"
        git push
