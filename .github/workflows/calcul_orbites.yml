name: SENTINELA - RECONSTRUCTION FORCEE

on:
  schedule:
    - cron: '5 0 * * *' # S'exécute AUTOMATIQUEMENT toutes les nuits à 00h05 UTC (02h05 heure française en été)
  workflow_dispatch: # Conserve l'option du bouton manuel sur votre écran mobile pour parer à toute urgence

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Configuration de l'environnement Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installation du module Requests
        run: pip install requests

      - name: Calcul des éphémérides (Execution Script)
        run: python calculer_orbites.py

      - name: Commiter et pousser la nouvelle matrice
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "SENTINELA : Régénération de la matrice 5D [Automatique]"
          file_pattern: 'orbites.json'
