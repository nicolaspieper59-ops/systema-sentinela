name: SENTINELA - RECONSTRUCTION FORCEE

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Configuration de l'environnement Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installation du module Requests
        run: pip install requests

      - name: Calcul des éphémérides (Execution Script)
        run: python calculer_orbites.py

      # Isolation des fichiers web pour contourner le blocage de sécurité de GitHub
      - name: Preparation du deploiement
        run: |
          mkdir _site
          rsync -av --exclude='.git*' --exclude='_site' ./ _site/

      - name: Configurer l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Déploiement Flash GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
