name: Astronomical Ephemeris Generation

on:
  schedule:
    - cron: '0 * * * *'  # Exécution au début de chaque heure
  workflow_dispatch:      # Permet le déclenchement manuel depuis l'onglet Actions

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-ephemeris-engine:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Extraction du dépôt
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: 2. Initialisation du runtime Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Chargement étanche des dépendances
      run: |
        python -m pip install --upgrade pip
        python -m pip install numpy astropy jplephem requests astropy-iers-data

    - name: 4. Exécution du générateur de matrice éphéméride
      run: |
        if [ -f "generate_matrix.py" ]; then
          echo "[SYS] Lancement de generate_matrix.py..."
          python generate_matrix.py
        else
          echo "[CRITICAL] generate_matrix.py est introuvable à la racine du dépôt."
          exit 1
        fi

    - name: 5. Publication et synchronisation de la matrice 5D
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Astropy Automation Bot"
        git config --global user.email "astropy-bot@github.com"
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        
        # Suivi des fichiers mis à jour par generate_matrix.py
        git add flux_live.json matrice_jpl_brute.csv orbites.json 2>/dev/null || true
        
        if git diff --staged --quiet; then
          echo "Aucune déviation cinématique ou modification de matrice détectée."
        else
          echo "Modifications détectées. Synchronisation des données orbitales en cours..."
          git commit -m "SENTINELA : Régénération de la matrice 5D [Automatique Cloud]"
          git push origin HEAD:${{ github.ref }}
        fi
