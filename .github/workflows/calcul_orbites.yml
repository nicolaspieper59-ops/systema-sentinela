name: Moteur Multiphysique Éphémérides

on:
  schedule:
    - cron: '*/10 * * * *' # Calcul automatique toutes les 10 minutes
  workflow_dispatch:
    inputs:
      profile:
        description: "Profil d'espace-temps à injecter"
        required: true
        default: 'MARSEILLE_FIXE'
        type: choice
        options:
          - MARSEILLE_FIXE
          - AVION
          - TRAIN
          - VOITURE
          - BATEAU

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Autorise explicitement l'écriture sur le dépôt

    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4

    - name: Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installation des dépendances métrologiques
      run: |
        python -m pip install --upgrade pip
        pip install numpy skyfield

    - name: Exécution du calcul physique JPL
      run: |
        PROFILE_MODE="${{ github.event.inputs.profile }}"
        if [ -z "$PROFILE_MODE" ]; then
          PROFILE_MODE="MARSEILLE_FIXE"
        fi
        echo "[CLOUD EXEC] Lancement du moteur avec le profil : $PROFILE_MODE"
        python dynamic_multiphysics_engine.py "$PROFILE_MODE"

    - name: Déploiement du Flux mis à jour sur GitHub Pages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add flux_live.json
        if ! git diff-index --quiet HEAD --; then
          git commit -m "SENTINELA CLOUD : Synchro Automatique Profil [$PROFILE_MODE]"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
          echo "[SUCCESS] Flux de métrologie synchronisé."
        else
          echo "[INFO] Aucune modification orbitale détectée."
        fi
