name: Synchronisation Orbitale NASA JPL

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Calcul des éphémérides et correction atmosphérique
        run: python calculer_orbites.py

      - name: Déploiement automatique de la matrice
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Compilateur Cinématique : Mise à jour de la matrice JPL [Marseille]"
          file_pattern: 'orbites.json'
          commit_user_name: "Sentinela-Automation"
          commit_user_email: "sentinela@auroramap.local"
