name: Moteur Multiphysique Éphémérides

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Configuration de Python
      uses: actions/setup-python@v5
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        python-version: '3.10'

    - name: Installation des dépendances métrologiques JPL
      run: |
        python -m pip install --upgrade pip
        pip install numpy skyfield jplephem

    - name: Exécution du calcul physique JPL
      run: |
        python dynamic_multiphysics_engine.py avion > flux_live.json

    - name: Déploiement et sauvegarde du flux de données
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add flux_live.json
        if ! git diff-index --quiet HEAD --; then
          git commit -m "Mise à jour métrologique JPL DE440 : $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
        else
          echo "Aucune variation métrologique détectée."
        fi
