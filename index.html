<script>
    const canvas = document.getElementById('radar-canvas');
    const ctx = canvas.getContext('2d');
    const debugDiv = document.getElementById('debug-console');
    
    let coordonnees3D = { lat: 43.28649, lon: 5.35437, alt: 89.5 };
    let d偏移_ms = 0; 
    let DonneesAstroCourantes = {};
    let pressionStationEtablie = 1013.25;

    function logDebug(msg, isErr = false) {
        debugDiv.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        debugDiv.style.color = isErr ? "#ff5555" : "var(--green)";
        debugDiv.style.backgroundColor = isErr ? "#1a0505" : "#051a05";
        debugDiv.style.borderColor = isErr ? "#551111" : "#115511";
    }

    function extraireNoeudFou(objet, nomCle) {
        if (!objet) return null;
        let cible = nomCle.toLowerCase();
        for (let k in objet) {
            if (k.toLowerCase() === cible) return objet[k];
        }
        return null;
    }

    // INTERPRÉTEUR UNIVERSEL DE COORDONNÉES ASTRO (Anti-Zéro Vector)
    function extraireCoordonneesAstre(liste, index) {
        let def = { az: 0, el: 0, dist_ua: 1, phase_pct: 0 };
        if (!liste || !liste[index]) return def;
        let cellule = liste[index];
        
        // Formate de type Tableau : [az, el, dist, phase] (Fréquent en sortie C++)
        if (Array.isArray(cellule)) {
            return {
                az: Number(cellule[0] ?? 0),
                el: Number(cellule[1] ?? 0),
                dist_ua: Number(cellule[2] ?? 1),
                phase_pct: Number(cellule[3] ?? 0)
            };
        }
        
        // Format de type Objet Dictionnaire : Recherche floue des clés
        if (typeof cellule === 'object') {
            let az = cellule.az ?? cellule.azimut ?? cellule.azimuth ?? cellule.r ?? 0;
            let el = cellule.el ?? cellule.elevation ?? cellule.alt ?? cellule.altitude ?? 0;
            let dist = cellule.dist_ua ?? cellule.dist ?? cellule.distance ?? 1;
            let phase = cellule.phase_pct ?? cellule.phase ?? cellule.illumination ?? 0;
            return { az: Number(az), el: Number(el), dist_ua: Number(dist), phase_pct: Number(phase) };
        }
        
        return def;
    }

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition((p) => {
            coordonnees3D.lat = p.coords.latitude;
            coordonnees3D.lon = p.coords.longitude;
            coordonnees3D.alt = p.coords.altitude || 89.5; 
            document.getElementById('geo-latlon').innerText = `${coordonnees3D.lat.toFixed(5)}° / ${coordonnees3D.lon.toFixed(5)}°`;
            document.getElementById('geo-alt').innerText = coordonnees3D.alt.toFixed(1);
        }, () => {}, { enableHighAccuracy: true });
    }

    function executerCalculsTempsAstronome(dateAtomique) {
        let tMs = dateAtomique.getTime();
        let jd = (tMs / 86400000) + 2440587.5;
        document.getElementById('astro-jd').innerText = jd.toFixed(5);

        let T = (jd - 2451545.0) / 36525;
        let gmst = 280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * T * T - (T * T * T) / 38710000;
        gmst = gmst % 360; if (gmst < 0) gmst += 360;

        let lstDeg = (gmst + coordonnees3D.lon) % 360; if (lstDeg < 0) lstDeg += 360;
        
        let heuresSidérales = lstDeg / 15;
        let h = Math.floor(heuresSidérales);
        let m = Math.floor((heuresSidérales - h) * 60);
        let s = Math.floor((((heuresSidérales - h) * 60) - m) * 60);
        document.getElementById('astro-lst').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function corrigerRefractionAtmospherique(elevationDeg, pression, temperature) {
        if (elevationDeg < -0.8) return 0; 
        let rArcmin = 1.02 / Math.tan((elevationDeg + (10.3 / (elevationDeg + 5.11))) * Math.PI / 180);
        let correction = rArcmin * (pression / 1013.25) * (283.15 / (273.15 + temperature));
        return correction / 60; 
    }

    async function acquérirEphéméridesJPL() {
        try {
            const reponse = await fetch('./flux_live.json?cache_bust=' + Date.now());
            if (!reponse.ok) throw new Error(`Échec HTTP: ${reponse.status}`);
            
            let dateServeurBrute = reponse.headers.get('Date');
            if (dateServeurBrute) {
                d偏移_ms = new Date(dateServeurBrute).getTime() - Date.now();
            }

            const flux = await reponse.json();

            // Mappings des conteneurs parents
            let jpl = extraireNoeudFou(flux, "EPHEMERIDES_JPL_1440") || extraireNoeudFou(flux, "jpl") || extraireNoeudFou(flux, "orbites") || flux;
            let meteo = extraireNoeudFou(flux, "METEO_TERRESTRE") || extraireNoeudFou(flux, "meteo") || flux;
            let dynamique = extraireNoeudFou(flux, "DYNAMIQUE_VEHICULE") || extraireNoeudFou(flux, "dynamique") || flux;
            let spatiale = extraireNoeudFou(flux, "METEO_SPATIALE") || extraireNoeudFou(flux, "spatiale") || flux;

            // Isolation des listes d'astres
            let lSoleil = extraireNoeudFou(jpl, "SOLEIL") || extraireNoeudFou(jpl, "sun");
            let lLune = extraireNoeudFou(jpl, "LUNE") || extraireNoeudFou(jpl, "moon");
            let lMercure = extraireNoeudFou(jpl, "MERCURE") || extraireNoeudFou(jpl, "mercury");
            let lVenus = extraireNoeudFou(jpl, "VENUS") || extraireNoeudFou(jpl, "venus");
            let lMars = extraireNoeudFou(jpl, "MARS") || extraireNoeudFou(jpl, "mars");
            let lJupiter = extraireNoeudFou(jpl, "JUPITER") || extraireNoeudFou(jpl, "jupiter");
            let lSaturne = extraireNoeudFou(jpl, "SATURNE") || extraireNoeudFou(jpl, "saturn");

            if (!lSoleil) {
                throw new Error("Erreur fatale: Liste 'SOLEIL' introuvable dans le dictionnaire.");
            }

            let dateAtomique = new Date(Date.now() + d偏移_ms);
            let hUTC = dateAtomique.getUTCHours();
            let mUTC = dateAtomique.getUTCMinutes();
            let sUTC = dateAtomique.getUTCSeconds();
            document.getElementById('clock-utc').innerText = `UTC ATOMIQUE : ${String(hUTC).padStart(2,'0')}:${String(mUTC).padStart(2,'0')}:${String(sUTC).padStart(2,'0')}`;

            executerCalculsTempsAstronome(dateAtomique);

            let index1440 = (hUTC * 60) + mUTC;
            document.getElementById('ast-index').innerText = index1440;

            // Extraction polymorphe immunisée
            let sol = extraireCoordonneesAstre(lSoleil, index1440);
            let lun = extraireCoordonneesAstre(lLune, index1440);
            let mer = extraireCoordonneesAstre(lMercure, index1440);
            let ven = extraireCoordonneesAstre(lVenus, index1440);
            let mar = extraireCoordonneesAstre(lMars, index1440);
            let jup = extraireCoordonneesAstre(lJupiter, index1440);
            let sat = extraireCoordonneesAstre(lSaturne, index1440);

            // Si malgré l'extracteur le vecteur reste nul, on affiche la signature de la cellule pour ajuster
            if (sol.az === 0 && sol.el === 0) {
                logDebug(`Alerte: Cellule lue à l'index ${index1440} = ${JSON.stringify(lSoleil[index1440])}`, true);
            } else {
                logDebug("Système de Métrologie Synchrone. Télémétrie 5D Opérationnelle.");
            }

            // Calculs Métio de Précision
            let tC = meteo.temperature_c ?? meteo.temp ?? 15.92;
            let hPct = meteo.humidite_pct ?? meteo.humidity ?? 60.0;
            let pMer = meteo.pression_mer_hpa ?? meteo.pressure ?? 1013.25;

            let e = (hPct / 100) * 6.112 * Math.exp((17.67 * tC) / (tC + 243.5)); 
            let tVirtuelleK = (tC + 273.15) / (1 - (e / pMer) * (1 - 0.622));
            let tVirtuelleC = tVirtuelleK - 273.15;
            document.getElementById('m-tvirt').innerText = tVirtuelleC.toFixed(2);

            pressionStationEtablie = pMer * Math.pow(1 - (0.0065 * coordonnees3D.alt) / (tVirtuelleK), 5.25588);
            document.getElementById('m-pres').innerText = pressionStationEtablie.toFixed(1);

            let rho = (pressionStationEtablie * 100) / (287.05 * tVirtuelleK);
            document.getElementById('m-rho').innerText = rho.toFixed(3);

            // Application des corrections géodésiques et atmosphériques
            let refSol = corrigerRefractionAtmospherique(sol.el, pressionStationEtablie, tVirtuelleC);
            document.getElementById('sol-pos').innerText = `${sol.az.toFixed(3)}° / ${(sol.el + refSol).toFixed(3)}°`;
            document.getElementById('sol-refract').innerText = refSol.toFixed(3);

            let refLun = corrigerRefractionAtmospherique(lun.el, pressionStationEtablie, tVirtuelleC);
            document.getElementById('lun-pos').innerText = `${lun.az.toFixed(3)}° / ${(lun.el + refLun).toFixed(3)}°`;
            
            document.getElementById('mer-pos').innerText = `${mer.az.toFixed(1)}° / ${mer.el.toFixed(1)}°`;
            document.getElementById('ven-pos').innerText = `${ven.az.toFixed(1)}° / ${ven.el.toFixed(1)}°`;
            document.getElementById('mar-pos').innerText = `${mar.az.toFixed(1)}° / ${mar.el.toFixed(1)}°`;
            document.getElementById('jup-pos').innerText = `${jup.az.toFixed(1)}° / ${jup.el.toFixed(1)}°`;
            document.getElementById('sat-pos').innerText = `${sat.az.toFixed(1)}° / ${sat.el.toFixed(1)}°`;

            let capMag = dynamique?.cap_magnetique_brut_deg ?? dynamique?.cap ?? 0;
            let decWmm = spatiale?.declinaison_wmm_deg ?? spatiale?.dec ?? 0;
            DonneesAstroCourantes = { sol, lun, mer, ven, mar, jup, sat, capVrai: (capMag + decWmm + 360) % 360 };

            générerRenduRadar();

        } catch (erreur) {
            logDebug(erreur.message, true);
        }
    }

    function générerRenduRadar() {
        if (!DonneesAstroCourantes.sol) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let cx = canvas.width / 2, cy = canvas.height / 2;
        let rMax = Math.min(cx, cy) - 40;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate((-DonneesAstroCourantes.capVrai * Math.PI) / 180);

        ctx.strokeStyle = "rgba(0, 240, 255, 0.1)";
        ctx.beginPath(); ctx.arc(0, 0, rMax, 0, 2*Math.PI); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, rMax*0.6, 0, 2*Math.PI); ctx.stroke();
        ctx.fillStyle = "var(--cyan)"; ctx.fillText("NORD VRAI ITRF", -35, -rMax - 12);

        function dessinerAstre(astre, couleur, taille, label) {
            let elRefractee = astre.el + corrigerRefractionAtmospherique(astre.el, pressionStationEtablie, 15.0);
            if (elRefractee < 0) return; 
            ctx.save();
            ctx.rotate((astre.az * Math.PI) / 180);
            let distanceCentre = rMax * (1 - (elRefractee / 90));
            ctx.fillStyle = couleur;
            ctx.beginPath(); ctx.arc(0, -distanceCentre, taille, 0, 2*Math.PI); ctx.fill();
            ctx.fillText(label, 8, -distanceCentre + 3);
            ctx.restore();
        }

        dessinerAstre(DonneesAstroCourantes.sol, "var(--amber)", 6, "SOLEIL");
        dessinerAstre(DonneesAstroCourantes.lun, "#e2e8f0", 5, "LUNE");
        dessinerAstre(DonneesAstroCourantes.ven, "var(--cyan)", 4, "VENUS");
        dessinerAstre(DonneesAstroCourantes.mar, "var(--pink)", 3, "MARS");
        dessinerAstre(DonneesAstroCourantes.jup, "var(--green)", 5, "JUPITER");
        ctx.restore();
    }

    function redimensionner() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        générerRenduRadar();
    }

    window.onresize = redimensionner;
    window.onload = () => { redimensionner(); acquérirEphéméridesJPL(); setInterval(acquérirEphéméridesJPL, 1000); };
            </script>
