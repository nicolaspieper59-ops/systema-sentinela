<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEMA SENTINELA v8.9.9 — Interface Optique Continue</title>
    <style>
        :root {
            --bg-main: #0a0e14; --bg-card: #101520; --border-color: #262c36;
            --text-primary: #e1e7ef; --text-secondary: #717f91;
            --accent-blue: #38bdf8; --accent-green: #4ade80; --accent-orange: #fb923c;
            --accent-red: #ef4444;
        }
        body { background-color: var(--bg-main); color: var(--text-primary); font-family: monospace; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .dashboard { display: grid; grid-template-columns: 1fr 450px; gap: 20px; max-width: 1200px; width: 100%; }
        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }
        .panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #radar { width: 100%; max-width: 340px; background: #05070c; border-radius: 50%; border: 1px solid var(--border-color); }
        .grid-line { stroke: #1e293b; }
        .radar-ring { fill: none; stroke: #0284c7; stroke-dasharray: 2 4; opacity: 0.5; }
        .pointer { stroke-linecap: round; transform-origin: 200px 200px; transition: transform 0.1s linear; }
        #legend { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .legend-item { background: var(--bg-card); border: 1px solid var(--border-color); padding: 12px; border-radius: 6px; font-size: 0.8rem; }
        .astro-name { font-size: 0.9rem; font-weight: bold; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .data-block { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; color: var(--text-secondary); }
        .data-block span strong { color: var(--text-primary); }
        #status-banner { width: 100%; background: #1e293b; padding: 8px; border-radius: 6px; font-size: 0.75rem; text-align: center; margin-bottom: 15px; border: 1px solid var(--border-color); line-height: 1.4; transition: all 0.3s ease; }
        #clock-source { font-size: 0.65rem; color: var(--text-secondary); text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="panel">
            <h2 style="color: var(--accent-blue); margin: 0 0 15px 0; font-size: 1rem;">SENTINELA v8.9.9 — MONITEUR DE SÉCURITÉ VECTORIEL</h2>
            <div id="status-banner" style="color: var(--accent-orange);">INITIALISATION DES COMPOSANTS FLUIDES...</div>
            <svg id="radar" viewBox="0 0 400 400">
                <line x1="200" y1="20" x2="200" y2="380" class="grid-line" />
                <line x1="20" y1="200" x2="380" y2="200" class="grid-line" />
                <circle cx="200" cy="200" r="160" class="radar-ring" />
                <circle cx="200" cy="200" r="100" class="radar-ring" />
                <g id="pointers"></g>
            </svg>
        </div>

        <div style="display: flex; flex-direction: column; gap: 15px;">
            <div id="legend"></div>
            <div>
                <div id="clock-display" style="font-size:0.8rem; color:var(--accent-blue); text-align:center; font-weight:bold;">UTC REALTIME : FLUX EN COURS...</div>
                <div id="clock-source">SOURCE : INITIALISATION TERMINALE</div>
            </div>
        </div>
    </div>

    <script>
        let horlogePrete = false;
        let matriceEpheremidesCachee = null;
        
        let tempsAtomiqueInitialMS = 0;
        let tempsMonotoniqueInitialMS = 0;
        let labelSourceTemps = "DÉCONNECTÉ";

        const ASTRES = { "SOLEIL": "10", "LUNE": "301", "JUPITER": "599" };
        const COULEURS = { "SOLEIL": "#f59e0b", "LUNE": "#94a3b8", "JUPITER": "#fb923c" };

        async function initialiserSysteme() {
            const banner = document.getElementById("status-banner");
            const labelSrc = document.getElementById("clock-source");
            
            try {
                let res = await fetch(`./orbites.json?v=${Date.now()}`, { cache: 'no-store' });
                if (res.ok) {
                    matriceEpheremidesCachee = await res.json();
                    horlogePrete = true;
                    banner.innerText = "CONNEXION JPL-NASA ÉTABLIE [FLUX STABLE]";
                    banner.style.color = "var(--accent-green)";

                    let serverDateStr = res.headers.get('Date');
                    if (serverDateStr) {
                        tempsAtomiqueInitialMS = Date.parse(serverDateStr);
                        tempsMonotoniqueInitialMS = performance.now();
                        labelSourceTemps = "HORLOGE ATOMIQUE VIA EN-TÊTE HTTP (STABLE)";
                        labelSrc.style.color = "var(--accent-green)";
                    } else {
                        throw new Error("En-tête réseau inaccessible.");
                    }
                } else {
                    banner.innerText = `PANNE DE MATRICE : Code serveur HTTP ${res.status}`;
                    banner.style.color = "var(--accent-red)";
                }
            } catch (e) {
                console.warn("Routage temporel de secours.", e);
                tempsAtomiqueInitialMS = Date.now();
                tempsMonotoniqueInitialMS = performance.now();
                labelSourceTemps = "HORLOGE LOCALE (SECOURS - RISQUE DE DRIFT)";
                labelSrc.style.color = "var(--accent-orange)";
            }
        }

        // Moteur de rendu cinétique continu réaligné
        setInterval(() => {
            if (tempsAtomiqueInitialMS === 0) return;

            let msEcouleesDepuisChargement = performance.now() - tempsMonotoniqueInitialMS;
            let tempsTrueUTCMS = tempsAtomiqueInitialMS + msEcouleesDepuisChargement;
            let nowObj = new Date(tempsTrueUTCMS);
            
            document.getElementById("clock-display").innerText = "UTC REALTIME : " + nowObj.toISOString().replace("T"," ").replace("Z","");
            document.getElementById("clock-source").innerText = "SOURCE : " + labelSourceTemps;

            if (!horlogePrete || !matriceEpheremidesCachee) return;
            
            let hours = nowObj.getUTCHours();
            let minutes = nowObj.getUTCMinutes();
            let seconds = nowObj.getUTCSeconds();
            let milliseconds = nowObj.getUTCMilliseconds();

            // Génération des formats de clés cibles (Zéro pad vs Espace pad de la NASA)
            let cleISO = `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}`;
            let cleNASA = `${String(hours).padStart(2,' ')}:${String(minutes).padStart(2,'0')}`;
            
            let minutesSuivantes = (hours * 60 + minutes + 1) % 1440;
            let hSuiv = Math.floor(minutesSuivantes/60);
            let mSuiv = minutesSuivantes % 60;
            let cleSuivanteISO = `${String(hSuiv).padStart(2,'0')}:${String(mSuiv).padStart(2,'0')}`;
            let cleSuivanteNASA = `${String(hSuiv).padStart(2,' ')}:${String(mSuiv).padStart(2,'0')}`;
            
            let ratio = (seconds + milliseconds / 1000) / 60;
            const banner = document.getElementById("status-banner");
            let modeSecoursActif = false;
            let retardMaxDetecte = 0;

            for (let name in ASTRES) {
                let blocAstre = matriceEpheremidesCachee[name];
                if (!blocAstre) continue;

                // Test de lecture tolérant sur les deux formats de clés possibles
                let ptA = blocAstre[cleISO] || blocAstre[cleNASA];
                let ptB = blocAstre[cleSuivanteISO] || blocAstre[cleSuivanteNASA];
                
                // MODULE DE PROTECTION VECTORIELLE AVANCÉE (Tolérance : 60 minutes de dérive)
                if (!ptA) {
                    modeSecoursActif = true; 
                    let minutesTotales = hours * 60 + minutes;
                    let tentative = 1;
                    
                    while (!ptA && tentative <= 60) { 
                        let minutesSecours = (minutesTotales - tentative + 1440) % 1440;
                        let hSecours = Math.floor(minutesSecours / 60);
                        let mSecours = minutesSecours % 60;
                        
                        let cISO = `${String(hSecours).padStart(2,'0')}:${String(mSecours).padStart(2,'0')}`;
                        let cNASA = `${String(hSecours).padStart(2,' ')}:${String(mSecours).padStart(2,'0')}`;
                        
                        ptA = blocAstre[cISO] || blocAstre[cNASA];
                        if (ptA) {
                            retardMaxDetecte = tentative;
                        }
                        tentative++;
                    }
                }

                if (!ptB) ptB = ptA; // Stabilisation géométrique par extrapolation stationnaire

                if (ptA && Array.isArray(ptA)) {
                    let az = parseFloat(ptA[0]);
                    let alt = parseFloat(ptA[1]);
                    let mag = ptA[2] !== "n.a." ? parseFloat(ptA[2]) : NaN;
                    let dist = parseFloat(ptA[3]);
                    let vit = parseFloat(ptA[4]);

                    if (ptB && Array.isArray(ptB) && ptB !== ptA) {
                        let azB = parseFloat(ptB[0]), altB = parseFloat(ptB[1]);
                        let magB = ptB[2] !== "n.a." ? parseFloat(ptB[2]) : mag;
                        let distB = parseFloat(ptB[3]), vitB = parseFloat(ptB[4]);

                        if (Math.abs(azB - az) > 180) { if (azB > az) az += 360; else azB += 360; }
                        
                        az = az + (azB - az) * ratio;
                        alt = alt + (altB - alt) * ratio;
                        if (!isNaN(mag) && !isNaN(magB)) mag = mag + (magB - mag) * ratio;
                        dist = dist + (distB - dist) * ratio;
                        vit = vit + (vitB - vit) * ratio;
                        
                        if (az >= 360) az -= 360;
                    }

                    // Actualisation géométrique du Radar SVG
                    const ptr = document.getElementById(`ptr-${name}`);
                    if (ptr) {
                        ptr.setAttribute("transform", `rotate(${az} 200 200)`);
                        ptr.style.opacity = alt < 0 ? "0.15" : "1"; 
                    }

                    // Injection textuelle unifiée
                    document.getElementById(`az-${name}`).innerText = az.toFixed(2) + "°";
                    document.getElementById(`alt-${name}`).innerText = alt.toFixed(2) + "°";
                    document.getElementById(`mag-${name}`).innerText = !isNaN(mag) ? mag.toFixed(2) : "n.a.";
                    document.getElementById(`vit-${name}`).innerText = !isNaN(vit) ? vit.toFixed(2) + " km/s" : "n.a.";
                    
                    if (!isNaN(dist) && dist > 0) {
                        let distKM = dist * 149597870.7;
                        document.getElementById(`dist-${name}`).innerText = distKM.toLocaleString('fr-FR', {maximumFractionDigits:0}) + " km";
                    } else {
                        document.getElementById(`dist-${name}`).innerText = "n.a.";
                    }
                } else {
                    document.getElementById(`az-${name}`).innerText = "...";
                    document.getElementById(`alt-${name}`).innerText = "...";
                    document.getElementById(`mag-${name}`).innerText = "...";
                    document.getElementById(`vit-${name}`).innerText = "...";
                    document.getElementById(`dist-${name}`).innerText = "...";
                }
            }

            // Gestionnaire des diagnostics de sécurité du bandeau principal
            if (modeSecoursActif) {
                banner.innerText = `RÉALIGNEMENT DES FLUX VECTORIELS [-${retardMaxDetecte} MIN] (CORRECTION ACTIVE)`;
                banner.style.color = "var(--accent-orange)";
                banner.style.background = "#2c1a04";
            } else {
                banner.innerText = "CONNEXION JPL-NASA ÉTABLIE [FLUX STABLE]";
                banner.style.color = "var(--accent-green)";
                banner.style.background = "#064e3b";
            }

        }, 100);

        // Génération structurelle automatique des composants SVG et de la légende
        const svgNS = "http://www.w3.org/2000/svg";
        const g = document.getElementById('pointers');
        const leg = document.getElementById('legend');
        
        for (let name in ASTRES) {
            let line = document.createElementNS(svgNS, "line");
            line.setAttribute("id", `ptr-${name}`);
            line.setAttribute("x1", "200"); line.setAttribute("y1", "200");
            line.setAttribute("x2", "200"); line.setAttribute("y2", "50");
            line.setAttribute("stroke", COULEURS[name]);
            line.setAttribute("stroke-width", "3");
            line.setAttribute("class", "pointer");
            g.appendChild(line);

            leg.innerHTML += `
                <div class="legend-item">
                    <div class="astro-name" style="color:${COULEURS[name]}">■ ${name} <span style="font-size:0.65rem; color:var(--accent-green)">[LIVE JPL]</span></div>
                    <div class="data-block">
                        <span>Hauteur: <strong id="alt-${name}">...</strong></span>
                        <span>Azimut: <strong id="az-${name}">...</strong></span>
                        <span>Magnitude: <strong id="mag-${name}">...</strong></span>
                        <span>Vitesse: <strong id="vit-${name}">...</strong></span>
                        <span style="grid-column: span 2">Distance: <strong id="dist-${name}">...</strong></span>
                    </div>
                </div>`;
        }

        initialiserSysteme();
    </script>
</body>
                    </html>
